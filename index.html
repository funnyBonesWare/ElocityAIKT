<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI: From Impact to Execution | Monthly CTO Call</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img
          src="/assets/elocity-logo.png"
          alt="Elocity"
          class="brand-logo"
        />
        <span class="brand-divider"></span>
        <span class="brand-text">Monthly CTO Call</span>
      </div>
      <div class="top-right">
        <div class="slide-indicator">
          <span id="currentSlide">1</span>/<span id="totalSlides">—</span>
        </div>
        <div class="progress" aria-label="Slide progress">
          <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
        <div id="dots" class="dots" aria-label="Slide position"></div>
      </div>
    </header>

    <main id="deck" class="deck" aria-live="polite">
      <section class="slide hero active">
        <div class="slide-no">01</div>
        <h1 class="anim" style="--d: 100ms">AI: From Impact to Execution</h1>
        <p class="subtitle anim" style="--d: 180ms">
          Loading presentation…
        </p>
      </section>
    </main>

    <nav class="controls">
      <button id="prevBtn" aria-label="Previous slide">← Prev</button>
      <button id="nextBtn" aria-label="Next slide">Next →</button>
    </nav>

    <!-- Image Modal -->
    <div id="imgModal" class="img-modal" aria-hidden="true">
      <div class="img-modal-backdrop"></div>
      <div class="img-modal-content">
        <button class="img-modal-close" aria-label="Close modal">&times;</button>
        <button class="img-modal-prev" aria-label="Previous image">&#8249;</button>
        <div class="img-modal-body">
          <div class="img-modal-stage"></div>
          <div class="img-modal-caption"></div>
          <div class="img-modal-counter"></div>
        </div>
        <button class="img-modal-next" aria-label="Next image">&#8250;</button>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
